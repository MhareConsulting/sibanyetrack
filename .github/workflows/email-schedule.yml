# Triggers scheduled org emails via HTTPS (no SSH). Requires repository secrets:
#   SITE_URL          — public base URL, e.g. https://track.example.co.za
#   CRON_EMAIL_TRIGGER_TOKEN — same value as CRON_EMAIL_TRIGGER_TOKEN in production .env
#
# Cron is UTC. 05:05 UTC ≈ 07:05 SAST (UTC+2).

name: Scheduled emails

on:
  schedule:
    - cron: "5 5 * * *"
  workflow_dispatch:

jobs:
  run-scheduled-emails:
    runs-on: ubuntu-latest
    steps:
      - name: Daily digest and expiry
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          TOKEN: ${{ secrets.CRON_EMAIL_TRIGGER_TOKEN }}
        run: |
          set -e
          curl -fsS -X POST "${SITE_URL%/}/api/cron/email-jobs/" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"job":"digest"}'
          curl -fsS -X POST "${SITE_URL%/}/api/cron/email-jobs/" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"job":"expiry"}'

      - name: Weekly summary (Mondays UTC)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          TOKEN: ${{ secrets.CRON_EMAIL_TRIGGER_TOKEN }}
        run: |
          set -e
          DOW=$(date -u +%u)
          if [ "$DOW" = "1" ]; then
            curl -fsS -X POST "${SITE_URL%/}/api/cron/email-jobs/" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"job":"weekly"}'
          fi

      - name: Monthly summary (1st UTC)
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          TOKEN: ${{ secrets.CRON_EMAIL_TRIGGER_TOKEN }}
        run: |
          set -e
          DOM=$(date -u +%d)
          if [ "$DOM" = "01" ]; then
            curl -fsS -X POST "${SITE_URL%/}/api/cron/email-jobs/" \
              -H "Authorization: Bearer ${TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"job":"monthly"}'
          fi
