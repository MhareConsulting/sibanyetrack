name: Poll Traccar alarms

on:
  workflow_dispatch:

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Poll Traccar alarm events
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          TOKEN: ${{ secrets.CRON_EMAIL_TRIGGER_TOKEN }}
        run: |
          curl -fsS -X POST "${SITE_URL%/}/api/cron/email-jobs/" \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"job": "poll_traccar_alarms"}'
