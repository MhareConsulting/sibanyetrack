<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied — myTrack</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --mh-cyan: #00C8FF; --mh-purple: #8A2BE2;
      --mh-gradient: linear-gradient(135deg, #00C8FF 0%, #8A2BE2 100%);
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #F7F8FB; color: #0A0A0A;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(17,24,39,0.08);
      padding: 48px 40px; max-width: 440px; width: 100%; text-align: center;
    }
    .icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, rgba(0,200,255,0.12) 0%, rgba(138,43,226,0.12) 100%);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 28px; height: 28px; color: #8A2BE2; }
    .code {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--mh-gradient); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 10px;
    }
    h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 10px; }
    p { color: #6b7280; font-size: 0.9rem; line-height: 1.6; margin-bottom: 28px; }
    .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 22px; border-radius: 999px;
      font-size: 0.88rem; font-weight: 600; cursor: pointer;
      border: none; text-decoration: none;
      background: var(--mh-gradient); color: #fff;
      box-shadow: 0 4px 14px -4px rgba(138,43,226,0.5);
    }
    .btn-ghost {
      background: #fff; color: #0A0A0A;
      box-shadow: inset 0 0 0 1.5px #e5e7eb;
    }
    .brand { margin-top: 32px; font-size: 0.72rem; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
          d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>
    <div class="code">403 · Forbidden</div>
    <h1>Access denied</h1>
    <p>You don't have permission to view this page. If you believe this is a mistake, contact your organisation administrator.</p>
    <div class="actions">
      <a href="/" class="btn">Go to dashboard</a>
      <a href="/accounts/login/" class="btn btn-ghost">Sign in</a>
    </div>
    <div class="brand">myTrack · MyReach</div>
  </div>
</body>
</html>
