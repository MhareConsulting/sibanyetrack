<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found — SibanyeTrack</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --mh-cyan: #AA985D; --mh-purple: #AA985D;
      --mh-gradient: linear-gradient(135deg, #AA985D 0%, #AA985D 100%);
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #F7F8FB; color: #0A0A0A;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      -webkit-font-smoothing: antialiased;
    }
    .card {
      background: #fff; border-radius: 16px;
      box-shadow: 0 4px 24px rgba(17,24,39,0.08);
      padding: 48px 40px; max-width: 440px; width: 100%; text-align: center;
    }
    .icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, rgba(0,200,255,0.12) 0%, rgba(138,43,226,0.12) 100%);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .icon svg { width: 28px; height: 28px; color: #AA985D; }
    .code {
      font-size: 0.7rem; font-weight: 700; letter-spacing: 0.14em;
      text-transform: uppercase;
      background: var(--mh-gradient); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
      margin-bottom: 10px;
    }
    h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 10px; }
    p { color: #6b7280; font-size: 0.9rem; line-height: 1.6; margin-bottom: 28px; }
    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 10px 22px; border-radius: 999px;
      font-size: 0.88rem; font-weight: 600; cursor: pointer;
      border: none; text-decoration: none;
      background: var(--mh-gradient); color: #fff;
      box-shadow: 0 4px 14px -4px rgba(170,152,93,0.5);
    }
    .brand { margin-top: 32px; font-size: 0.72rem; color: #9ca3af; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.75"
          d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
      </svg>
    </div>
    <div class="code">404 · Not Found</div>
    <h1>Page not found</h1>
    <p>The page you're looking for doesn't exist or has been moved. Check the URL or head back to the dashboard.</p>
    <a href="/" class="btn">Go to dashboard</a>
    <div class="brand">SibanyeTrack · Sibanye-Stillwater</div>
  </div>
</body>
</html>
