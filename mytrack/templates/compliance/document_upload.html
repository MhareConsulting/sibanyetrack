{% extends "base.html" %}
{% block title %}Upload Document — myTrack{% endblock %}
{% block page_title %}Upload Document{% endblock %}

{% block content %}
<div class="content-padded" style="max-width:600px">

  {% for error in errors %}
  <div class="alert alert-danger">{{ error }}</div>
  {% endfor %}

  <div class="card">
    <form method="post" enctype="multipart/form-data">
      {% csrf_token %}

      <div class="form-group">
        <label>Vehicle</label>
        <select name="vehicle" class="form-control" required>
          <option value="">— Select vehicle —</option>
          {% for v in vehicles %}
          <option value="{{ v.pk }}"{% if post.vehicle == v.pk|stringformat:"s" %} selected{% endif %}>{{ v.registration }}{% if v.label %} — {{ v.label }}{% endif %}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Document type</label>
        <select name="kind" class="form-control" required>
          <option value="">— Select type —</option>
          {% for val, label in kind_choices %}
          <option value="{{ val }}"{% if post.kind == val %} selected{% endif %}>{{ label }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="form-group">
        <label>Label <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
        <input type="text" name="label" class="form-control" value="{{ post.label }}" placeholder="e.g. Policy #MT-2024-001">
      </div>

      <div class="form-group">
        <label>File</label>
        <input type="file" name="file" class="form-control" accept=".pdf,.jpg,.jpeg,.png" required>
        <p style="font-size:0.78rem;color:var(--text-muted);margin-top:4px">PDF, JPG, or PNG — max 5 MB</p>
      </div>

      <div class="form-group">
        <label>Expiry date <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
        <input type="date" name="expiry_date" class="form-control" value="{{ post.expiry_date }}">
      </div>

      <div class="form-group">
        <label>Notes <span style="font-weight:400;color:var(--text-muted)">(optional)</span></label>
        <textarea name="notes" class="form-control" rows="3" placeholder="Any relevant notes…">{{ post.notes }}</textarea>
      </div>

      <div style="display:flex;gap:10px;margin-top:8px">
        <button type="submit" class="btn btn-primary">Upload</button>
        <a href="{% url 'document-list' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>

</div>
{% endblock %}
