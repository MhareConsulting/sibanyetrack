<div class="tpod-wrap">
  <div class="tpod" id="telemetry-pod">

    <!-- Header: status dots + label + collapse -->
    <div class="tpod-head">
      <div class="tpod-dots">
        <span class="tpod-dot" data-vital="rssi"    title="Signal"></span>
        <span class="tpod-dot" data-vital="sats"    title="Satellites"></span>
        <span class="tpod-dot" data-vital="power"   title="Power"></span>
        <span class="tpod-dot" data-vital="battery" title="Battery"></span>
        <span class="tpod-dot" data-vital="online"  title="Device"></span>
      </div>
      <span class="tpod-head-label">Telemetry</span>
      <button class="tpod-toggle" id="tpod-toggle" title="Collapse">&#8250;</button>
    </div>

    <!-- Body: speed ring (left) + right column -->
    <div class="tpod-body">
      <div class="tpod-speed-ring">
        <span class="tpod-speed-value">0</span>
        <span class="tpod-speed-unit">km/h</span>
      </div>
      <div class="tpod-right">
        <div class="tpod-dir">
          <span class="tpod-arrow" style="transform:rotate(0deg)">&#8594;</span>
          <span class="tpod-cardinal">--</span>
          <span class="tpod-bearing">--&deg;</span>
        </div>
        <div class="tpod-speed-bar" data-ratio="ok">
          <div class="tpod-speed-fill" style="width:0%"></div>
        </div>
        <span class="tpod-limit-label">-- km/h limit</span>
        <div class="tpod-warnings">
          <span class="tpod-warn-pill" data-alert="HARSH_BRAKING">BRK</span>
          <span class="tpod-warn-pill" data-alert="HARSH_ACCEL">ACC</span>
          <span class="tpod-warn-pill" data-alert="HARSH_CORNERING">CRN</span>
          <span class="tpod-warn-pill" data-alert="SPEEDING">SPD</span>
          <span class="tpod-warn-pill" data-alert="IDLE">IDLE</span>
        </div>
      </div>
    </div>

    <!-- Footer: odometer + engine hours -->
    <div class="tpod-foot">
      <div class="tpod-stat">
        <span class="tpod-stat-lbl">ODO</span>
        <span class="tpod-stat-val" data-field="odometer">&mdash;</span>
        <span class="tpod-stat-unit">km</span>
      </div>
      <div class="tpod-stat">
        <span class="tpod-stat-lbl">ENG</span>
        <span class="tpod-stat-val" data-field="engine_hours">&mdash;</span>
        <span class="tpod-stat-unit">h</span>
      </div>
    </div>

  </div>
</div>
