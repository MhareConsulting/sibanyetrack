server {
    listen 80;
    server_name sibanyetrack.mharetech.co.za;
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    server_name sibanyetrack.mharetech.co.za;

    ssl_certificate     /etc/letsencrypt/live/sibanyetrack.mharetech.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sibanyetrack.mharetech.co.za/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # All requests proxied to Gunicorn; WhiteNoise serves /static/ from within the container
    location / {
        proxy_pass         http://127.0.0.1:8004;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # SSE (live vehicle stream) — disable buffering so events reach the browser immediately
        proxy_buffering    off;
        proxy_cache        off;
    }
}
