server {
    listen 80;
    server_name sibanyetrack.mharetech.co.za;

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name sibanyetrack.mharetech.co.za;

    ssl_certificate     /etc/letsencrypt/live/sibanyetrack.mharetech.co.za/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sibanyetrack.mharetech.co.za/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # Static files served directly by nginx
    location /static/ {
        alias /home/ubuntu/sibanyetrack/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else proxied to Gunicorn on port 8002
    location / {
        proxy_pass         http://127.0.0.1:8002;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;

        # SSE (live vehicle stream) — disable buffering so events reach the browser immediately
        proxy_buffering    off;
        proxy_cache        off;
    }
}
